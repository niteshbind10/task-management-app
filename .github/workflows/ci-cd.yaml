name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  lint-and-test:
    name: Run Lint and Test Checks
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install & Run Backend Tests
        env:
          JWT_SECRET_KEY: test_secret_key_for_testing_purposes_only
          NODE_ENV: test
        run: |
          cd backend
          npm ci
          npm test

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

  build-and-push:
    name: Build & Push Docker Images
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/task-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/task-backend:sha-${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/task-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/task-frontend:sha-${{ github.sha }}
